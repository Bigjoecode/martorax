<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#059467",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f172a",
                        "slate-card": "#1e293b",
                        "slate-input": "#334155",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100dvh;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-900 font-display flex items-end justify-center min-h-screen overflow-hidden">
<div class="fixed inset-0 bg-black/60 z-0"></div>
<div class="relative w-full max-w-md bg-slate-800 rounded-t-xl shadow-2xl z-10 flex flex-col max-h-[92vh]">
<div class="flex flex-col items-center pt-3">
<div class="h-1.5 w-12 rounded-full bg-slate-600"></div>
</div>
<div class="flex items-center justify-between px-5 pt-3 pb-2">
<h2 class="text-white text-lg font-bold leading-tight tracking-tight">Create Quote</h2>
<button class="text-slate-400 hover:text-white transition-colors p-1">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<div class="flex-1 overflow-y-auto px-5 pt-2 pb-4 space-y-4">
<div class="flex flex-col">
<label class="flex flex-col w-full">
<p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1.5 ml-1">Service Description</p>
<textarea class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-600 bg-slate-700/50 focus:border-primary min-h-[100px] placeholder:text-slate-500 p-3.5 text-sm font-normal leading-relaxed resize-none transition-all" placeholder="Describe the service details..."></textarea>
</label>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="flex flex-col">
<label class="flex flex-col w-full">
<p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1.5 ml-1">Material (₦)</p>
<div class="relative">
<span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">₦</span>
<input class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-600 bg-slate-700/50 focus:border-primary h-11 pl-8 pr-3 placeholder:text-slate-500 text-sm font-medium transition-all" placeholder="0.00" type="number"/>
</div>
</label>
</div>
<div class="flex flex-col">
<label class="flex flex-col w-full">
<p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1.5 ml-1">Labor (₦)</p>
<div class="relative">
<span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">₦</span>
<input class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-600 bg-slate-700/50 focus:border-primary h-11 pl-8 pr-3 placeholder:text-slate-500 text-sm font-medium transition-all" placeholder="0.00" type="number"/>
</div>
</label>
</div>
</div>
<div class="bg-primary/10 border border-primary/25 rounded-xl px-4 py-3 flex justify-between items-center">
<div>
<p class="text-primary text-[10px] font-bold uppercase tracking-widest">Total Quote Amount</p>
<p class="text-white text-xl font-extrabold mt-0.5">₦ 0.00</p>
</div>
<div class="bg-primary/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary text-2xl">payments</span>
</div>
</div>
<div class="flex items-center justify-between p-3.5 bg-slate-700/30 border border-slate-600/50 rounded-xl">
<div class="flex flex-col gap-0.5">
<div class="flex items-center gap-1.5">
<span class="text-white font-semibold text-sm">SafePay Escrow</span>
<span class="material-symbols-outlined text-slate-400 text-[16px] cursor-help">info</span>
</div>
<p class="text-slate-400 text-[10px] leading-tight max-w-[180px]">Protected payment released after verification.</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-10 h-5.5 bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4.5 after:w-4.5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
<div class="px-5 py-4 bg-slate-800 border-t border-slate-700/50 pb-8">
<button class="w-full bg-primary hover:bg-emerald-600 text-white font-bold h-12 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
<span>Send Quote to Customer</span>
<span class="material-symbols-outlined text-xl">send</span>
</button>
<p class="text-center text-slate-500 text-[11px] mt-3">
                The customer will receive a notification to review and accept this quote.
            </p>
</div>
</div>

</body></html>
