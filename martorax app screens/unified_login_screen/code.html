<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Unified Login Screen - MartoraX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#09aa77",
                        "background-light": "#f5f8f7",
                        "background-dark": "#10221c",
                        "slate-custom": "#1e293b",
                        "slate-dark": "#0f172a"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<div class="relative flex h-full min-h-screen w-full max-w-[430px] flex-col bg-background-light dark:bg-background-dark group/design-root overflow-hidden border-x border-gray-200 dark:border-gray-800 shadow-2xl">
<!-- TopAppBar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div class="w-10 flex justify-start">
<span class="material-symbols-outlined text-white cursor-pointer">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">MartoraX</h2>
<div class="w-10"></div>
</div>
<div class="flex flex-col px-6 pt-10">
<!-- Brand Logo/Accent -->
<div class="flex justify-center mb-6">
<div class="w-16 h-16 rounded-2xl bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[40px]">shield_person</span>
</div>
</div>
<!-- HeadlineText -->
<h1 class="text-white tracking-light text-[32px] font-bold leading-tight text-center pb-2">Welcome Back</h1>
<p class="text-gray-400 text-center text-base mb-8">Login to your MartoraX account</p>
<!-- Form Section -->
<div class="space-y-2">
<!-- TextField: Email/Phone -->
<div class="flex flex-col w-full">
<p class="text-white text-sm font-medium leading-normal pb-2 ml-1">Phone Number or Email</p>
<input class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-gray-700 bg-slate-custom/30 focus:border-primary h-14 placeholder:text-gray-500 p-[15px] text-base font-normal leading-normal transition-all" placeholder="name@example.com" type="text" value=""/>
</div>
<!-- TextField: Password -->
<div class="flex flex-col w-full pt-4">
<p class="text-white text-sm font-medium leading-normal pb-2 ml-1">Password</p>
<div class="flex w-full items-stretch rounded-xl overflow-hidden">
<input class="form-input flex w-full min-w-0 flex-1 border border-gray-700 bg-slate-custom/30 text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:border-primary h-14 placeholder:text-gray-500 p-[15px] rounded-r-none border-r-0 text-base font-normal leading-normal transition-all" placeholder="Enter password" type="password" value=""/>
<div class="text-gray-400 flex border border-gray-700 bg-slate-custom/30 items-center justify-center pr-[15px] rounded-r-xl border-l-0 cursor-pointer">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</div>
<!-- MetaText: Forgot Password -->
<div class="flex justify-end pt-1">
<p class="text-gray-400 text-sm font-normal leading-normal underline cursor-pointer hover:text-primary transition-colors">Forgot Password?</p>
</div>
</div>
<!-- Primary Login Button -->
<button class="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-4 rounded-xl mt-8 text-lg transition-all shadow-lg shadow-primary/20 active:scale-[0.98]">
                Login
            </button>
<!-- Divider -->
<div class="flex items-center my-10">
<div class="flex-grow border-t border-gray-700"></div>
<span class="px-4 text-gray-500 text-sm">Or continue with</span>
<div class="flex-grow border-t border-gray-700"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-slate-custom/40 border border-gray-700 text-white py-3 rounded-xl hover:bg-slate-custom/60 transition-all">
<img alt="Google Logo" class="w-5 h-5" data-alt="Google logo icon for social login" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAzs4bfMAVonS5M_odeLErEcnvJE5Eo-tb484NOeJOzXtkhtxU3Nur36TuIALKKZ1b77Va6U5iWAjtTZTRLlfcPRl9_UqhA6tJ4d5FlCFIrbae1N6B7S3AGHQShXKYRuVY6zcd1TtwvfSyXjgnxFVxonuLBZU2FSQujOnr8AoScH4V7cjP0qFpr3wgoWAZwCUgnJ1d7qNAWQyfT-eO4K0adgE_-n139P0s9bnBJg01v3534ym6FO4tiEI3m2QNP4X_egE5ef7YBJEBi"/>
<span class="font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-slate-custom/40 border border-gray-700 text-white py-3 rounded-xl hover:bg-slate-custom/60 transition-all">
<span class="material-symbols-outlined text-xl">ios</span>
<span class="font-medium">Apple</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-auto pt-12 pb-8 text-center">
<p class="text-gray-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Decorative Background Elements -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-1/2 -left-32 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
