<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Release Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#09f6ab",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f172a", // Updated to Slate 900 as requested
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glow-effect {
            box-shadow: 0 0 40px 10px rgba(9, 246, 171, 0.15);
        }
        .checkmark-bg {
            background: radial-gradient(circle, rgba(9, 246, 171, 0.2) 0%, rgba(15, 23, 42, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white transition-colors duration-300">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-white flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Success</h2>
</div>
<div class="flex flex-1 flex-col items-center justify-center px-6">
<!-- Success Visual -->
<div class="relative mb-8 flex items-center justify-center">
<!-- Outer Glow -->
<div class="absolute w-64 h-64 checkmark-bg rounded-full"></div>
<!-- Inner Circle with Icon -->
<div class="relative flex h-32 w-32 items-center justify-center rounded-full bg-primary/20 glow-effect border border-primary/30">
<span class="material-symbols-outlined text-primary text-[64px] font-bold" style="font-variation-settings: 'wght' 700, 'opsz' 48;">
                        check_circle
                    </span>
</div>
</div>
<!-- Headline -->
<div class="w-full text-center">
<h1 class="text-white tracking-tight text-[32px] font-extrabold leading-tight pb-3">Payment Released!</h1>
</div>
<!-- Body Message -->
<div class="max-w-[320px] text-center">
<p class="text-slate-400 text-base font-normal leading-relaxed pb-8">
<span class="text-primary font-semibold">₦25,000</span> has been sent to <span class="text-white font-medium">Sarah Johnson</span>. Thank you for using MartoraX SafePay.
                </p>
</div>
<!-- Transaction Badge (Subtle) -->
<div class="mb-10 inline-flex items-center gap-2 rounded-full bg-slate-800/50 px-4 py-2 border border-slate-700">
<span class="material-symbols-outlined text-primary text-sm">verified_user</span>
<span class="text-xs font-medium text-slate-300 uppercase tracking-widest">SafePay Verified</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex justify-center pb-12">
<div class="flex flex-1 gap-4 max-w-[480px] flex-col items-stretch px-6">
<!-- Primary Button: Write a Review -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-[#0f172a] text-base font-bold leading-normal tracking-[0.015em] w-full hover:bg-primary/90 transition-all active:scale-[0.98]">
<span class="truncate">Write a Review</span>
</button>
<!-- Secondary Button: Back to Home -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-transparent border-2 border-slate-700 text-white text-base font-bold leading-normal tracking-[0.015em] w-full hover:bg-slate-800 transition-all active:scale-[0.98]">
<span class="truncate">Back to Home</span>
</button>
</div>
</div>
<!-- Bottom Safe Indicator (iOS Home Bar Space) -->
<div class="h-8 w-full bg-transparent"></div>
</div>
</body></html>
