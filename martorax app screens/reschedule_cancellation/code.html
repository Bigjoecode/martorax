<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reschedule &amp; Cancellation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#09f6ab",
                "background-light": "#f5f8f7",
                "background-dark": "#0f172a", // Slate 900 feel as requested
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">arrow_back_ios</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Reschedule &amp; Cancellation</h2>
</header>
<main class="flex-1 overflow-y-auto pb-32">
<!-- SectionHeader: Date Selection -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">New Date &amp; Time</h3>
</div>
<!-- CalendarPicker -->
<div class="flex flex-wrap items-center justify-center gap-6 p-4">
<div class="flex min-w-full md:min-w-72 max-w-[336px] flex-1 flex-col gap-0.5 bg-slate-100 dark:bg-slate-800/50 p-4 rounded-xl">
<div class="flex items-center p-1 justify-between mb-2">
<button class="hover:bg-slate-200 dark:hover:bg-slate-700 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-white">chevron_left</span>
</button>
<p class="text-slate-900 dark:text-white text-base font-bold leading-tight flex-1 text-center">October 2023</p>
<button class="hover:bg-slate-200 dark:hover:bg-slate-700 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-white">chevron_right</span>
</button>
</div>
<div class="grid grid-cols-7 text-center">
<p class="text-slate-500 dark:text-slate-400 text-[13px] font-bold h-10 flex items-center justify-center">S</p>
<p class="text-slate-500 dark:text-slate-400 text-[13px] font-bold h-10 flex items-center justify-center">M</p>
<p class="text-slate-500 dark:text-slate-400 text-[13px] font-bold h-10 flex items-center justify-center">T</p>
<p class="text-slate-500 dark:text-slate-400 text-[13px] font-bold h-10 flex items-center justify-center">W</p>
<p class="text-slate-500 dark:text-slate-400 text-[13px] font-bold h-10 flex items-center justify-center">T</p>
<p class="text-slate-500 dark:text-slate-400 text-[13px] font-bold h-10 flex items-center justify-center">F</p>
<p class="text-slate-500 dark:text-slate-400 text-[13px] font-bold h-10 flex items-center justify-center">S</p>
<!-- Days -->
<button class="h-10 w-full text-slate-400 col-start-4 text-sm font-medium">1</button>
<button class="h-10 w-full text-slate-400 text-sm font-medium">2</button>
<button class="h-10 w-full text-slate-400 text-sm font-medium">3</button>
<button class="h-10 w-full text-slate-400 text-sm font-medium">4</button>
<button class="h-10 w-full text-slate-900 text-sm font-bold">
<div class="flex size-8 mx-auto items-center justify-center rounded-full bg-primary">5</div>
</button>
<button class="h-10 w-full text-slate-900 dark:text-white text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full">6</button>
<button class="h-10 w-full text-slate-900 dark:text-white text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full">7</button>
<button class="h-10 w-full text-slate-900 dark:text-white text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full">8</button>
<button class="h-10 w-full text-slate-900 dark:text-white text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full">9</button>
<button class="h-10 w-full text-slate-900 dark:text-white text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full">10</button>
<button class="h-10 w-full text-slate-900 dark:text-white text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full">11</button>
<button class="h-10 w-full text-slate-900 dark:text-white text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full">12</button>
</div>
</div>
</div>
<!-- Chips: Time Slots -->
<div class="flex gap-3 px-4 py-3 flex-wrap">
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/20 border border-primary/30 px-4">
<p class="text-primary text-sm font-bold leading-normal">09:00 AM</p>
</div>
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-slate-200 dark:bg-slate-800 px-4">
<p class="text-slate-900 dark:text-slate-300 text-sm font-medium leading-normal">10:30 AM</p>
</div>
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-slate-200 dark:bg-slate-800 px-4">
<p class="text-slate-900 dark:text-slate-300 text-sm font-medium leading-normal">12:00 PM</p>
</div>
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-slate-200 dark:bg-slate-800 px-4">
<p class="text-slate-900 dark:text-slate-300 text-sm font-medium leading-normal">01:30 PM</p>
</div>
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-slate-200 dark:bg-slate-800 px-4">
<p class="text-slate-900 dark:text-slate-300 text-sm font-medium leading-normal">03:00 PM</p>
</div>
<div class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-slate-200 dark:bg-slate-800 px-4">
<p class="text-slate-900 dark:text-slate-300 text-sm font-medium leading-normal">04:30 PM</p>
</div>
</div>
<!-- SectionHeader: Reason for Change -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Reason for Change</h3>
</div>
<!-- Text Area Component -->
<div class="px-4 pb-6">
<textarea class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg p-4 text-slate-900 dark:text-white placeholder-slate-500 focus:ring-2 focus:ring-primary min-h-[120px]" placeholder="Please explain why you need to reschedule or cancel your booking..."></textarea>
</div>
</main>
<!-- Footer Actions -->
<footer class="fixed bottom-0 left-0 right-0 bg-background-light dark:bg-background-dark p-4 space-y-4 border-t border-slate-200 dark:border-slate-800">
<button class="w-full bg-primary hover:bg-emerald-500 text-slate-900 font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
            Request Reschedule
        </button>
<div class="flex flex-col items-center gap-2">
<button class="text-rose-500 font-bold text-sm hover:text-rose-600 transition-colors">
                Cancel Booking
            </button>
<div class="flex items-start gap-2 max-w-[90%] text-center">
<p class="text-slate-500 dark:text-slate-400 text-xs italic">
                    Cancellations may affect your rating or incur a small fee.
                </p>
</div>
</div>
<!-- iOS Home Indicator Spacing -->
<div class="h-4"></div>
</footer>
</body></html>
