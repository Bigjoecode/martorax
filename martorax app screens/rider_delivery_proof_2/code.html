<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rider Delivery Proof</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#059467",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f172a", // Slate 900 as requested
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Public Sans", sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 bg-background-light dark:bg-background-dark/95 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center p-4 justify-between max-w-md mx-auto">
<button class="text-slate-900 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Arrived at Destination</h2>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-1 max-w-md mx-auto w-full pb-32">
<!-- HeadlineText -->
<div class="px-4 pt-6 pb-2">
<h3 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight">Take a Photo of Delivered Items</h3>
</div>
<!-- BodyText -->
<div class="px-4 pb-4">
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">
                Photo evidence is required for SafePay fund release. Ensure the items and house number (if possible) are visible.
            </p>
</div>
<!-- Camera Capture Area / Preview -->
<div class="px-4 mb-6">
<div class="relative aspect-[3/4] w-full rounded-xl overflow-hidden bg-slate-200 dark:bg-slate-800 border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center text-slate-500 dark:text-slate-400">
<!-- Using a styled div as a placeholder for the live camera view -->
<div class="absolute inset-0 opacity-20 bg-gradient-to-br from-primary/30 to-transparent"></div>
<span class="material-symbols-outlined text-6xl mb-2 opacity-50">photo_camera</span>
<p class="text-sm font-medium">Tap shutter to capture</p>
</div>
</div>
<!-- CameraControl -->
<div class="flex items-center justify-center gap-8 p-4 mb-4">
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white shadow-sm border border-slate-300 dark:border-slate-700">
<span class="material-symbols-outlined">image</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-20 bg-primary text-white shadow-lg transform active:scale-95 transition-transform">
<span class="material-symbols-outlined !text-4xl">photo_camera</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white shadow-sm border border-slate-300 dark:border-slate-700">
<span class="material-symbols-outlined">flash_on</span>
</button>
</div>
<!-- TextField -->
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal pb-2">Delivery Notes</p>
<textarea class="form-input flex w-full resize-none overflow-hidden rounded-lg text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 placeholder:text-slate-400 dark:placeholder:text-slate-500 min-h-32 p-4 text-base font-normal leading-normal transition-colors" placeholder="e.g., Left at the gate with Security"></textarea>
</label>
</div>
</main>
<!-- Fixed Footer -->
<footer class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 p-4 pb-8">
<div class="max-w-md mx-auto flex flex-col gap-3">
<div class="flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider mb-1">
<span class="material-symbols-outlined text-sm">lock</span>
                Next Step: 4-Digit Customer Code
            </div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                Submit Proof
                <span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</footer>
</body></html>
