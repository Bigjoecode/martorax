<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice-to-Quote Interface</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#09f6ab",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f172a", // Slate 900 feel
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .mic-pulse {
            box-shadow: 0 0 0 0 rgba(9, 246, 171, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(9, 246, 171, 0.7);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(9, 246, 171, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(9, 246, 171, 0);
            }
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen flex flex-col items-center">
<div class="w-full max-w-md min-h-screen flex flex-col bg-background-light dark:bg-background-dark relative overflow-hidden">
<!-- TopAppBar -->
<div class="flex items-center p-6 pb-2 justify-between w-full">
<div class="text-primary flex size-10 shrink-0 items-center justify-center rounded-full bg-primary/10">
<span class="material-symbols-outlined">waves</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 px-4">Voice-to-Quote</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
<!-- AI Status Indicator -->
<div class="px-6 py-2">
<div class="inline-flex items-center gap-2 bg-primary/10 border border-primary/20 px-3 py-1 rounded-full">
<div class="size-2 bg-primary rounded-full animate-pulse"></div>
<span class="text-xs font-bold text-primary uppercase tracking-widest">Listening...</span>
</div>
</div>
<!-- Main Voice Visualization Section -->
<div class="flex-1 flex flex-col items-center justify-center px-6 gap-8">
<!-- Pulse Microphone -->
<div class="relative flex items-center justify-center">
<div class="mic-pulse absolute size-32 bg-primary/20 rounded-full"></div>
<button class="relative z-10 flex size-24 cursor-pointer items-center justify-center overflow-hidden rounded-full bg-primary text-slate-900 shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-4xl">mic</span>
</button>
</div>
<!-- Transcription Area (HeadlineText modification) -->
<div class="w-full">
<p class="text-slate-500 dark:text-slate-400 text-xs text-center uppercase tracking-widest mb-2 font-bold">Transcription</p>
<h3 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight px-4 text-center">
                    "I go fix the pipe for <span class="text-primary">5k</span>, material na <span class="text-primary">2k</span>"
                </h3>
</div>
</div>
<!-- Generated Result Section (DescriptionList modification) -->
<div class="px-4 pb-8">
<div class="glass-panel rounded-xl p-6 shadow-2xl">
<!-- SectionHeader -->
<div class="flex items-center justify-between mb-4 border-b border-white/10 pb-4">
<h3 class="text-white text-lg font-bold leading-tight tracking-tight">Generated Quote</h3>
<span class="text-primary text-xs font-bold px-2 py-1 bg-primary/10 rounded">AUTO-PARSED</span>
</div>
<div class="space-y-4">
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400 text-sm">construction</span>
<p class="text-slate-400 text-base font-medium">Labor</p>
</div>
<p class="text-white text-lg font-semibold tracking-tight">₦5,000</p>
</div>
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400 text-sm">shopping_cart</span>
<p class="text-slate-400 text-base font-medium">Materials</p>
</div>
<p class="text-white text-lg font-semibold tracking-tight">₦2,000</p>
</div>
<div class="pt-4 border-t border-white/10 flex justify-between items-center">
<p class="text-primary text-sm font-bold uppercase tracking-wider">Total Amount</p>
<p class="text-primary text-2xl font-extrabold tracking-tighter">₦7,000</p>
</div>
</div>
</div>
<!-- SingleButton (Confirm & Send) -->
<div class="mt-6 flex flex-col gap-3">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 bg-primary text-slate-900 gap-3 text-lg font-bold leading-normal tracking-tight shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">send</span>
                    Confirm &amp; Send
                </button>
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 bg-transparent text-slate-400 border border-slate-700 gap-2 text-sm font-semibold hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-sm">refresh</span>
                    Try Recording Again
                </button>
</div>
</div>
<!-- Bottom Safe Area -->
<div class="h-6 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
