<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vendor Registration | MartoraX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#05ad3a", // Emerald 600 style
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a", // Slate 900
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>body {
    font-family: "Plus Jakarta Sans", sans-serif
    }
.form-input:focus {
    border-color: #05ad3a !important;
    box-shadow: 0 0 0 1px #05ad3a !important
    }
/* Custom Select Arrow */
.custom-select {
    appearance: none;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBQL_MQhg7K73kVec0dbR2FyFZMauwuwNYIGtOCa_q4rj4KUCAoEhBGMTZAV9_YyAOLmAGmpaXg6Vqwyu3Lpy2S86Te-_6jOr8cTA_rj3CtGrIhYtMnqx7PpyXgGBnDDfPYbwJFz4lkX2vezoFnmjMEQ0YdxepweV8HpU5eyh7Q6gX9T-GUeLVKtsktYMLmM1OsKl_x-oLPz-cz2vN1JrgX_xEcj4pbhveMTH4BzN8CKQ4grw4KyNbS6j_od487rU_KVzWYNiF9MRtT);
    background-position: right 0.75rem center;
    background-repeat: no-repeat;
    background-size: 1.5em 1.5em
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight">Register as a Vendor</h2>
</div>
<div class="text-xs font-semibold px-3 py-1 bg-primary/10 text-primary rounded-full">
            Step 1 of 3
        </div>
</header>
<main class="flex-1 flex flex-col max-w-md mx-auto w-full pb-32">
<!-- Hero Section -->
<div class="px-6 pt-8 pb-4">
<h3 class="text-3xl font-extrabold leading-tight tracking-tight mb-2">Grow your business in Asaba</h3>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                Join the MartoraX network and reach thousands of customers across the city.
            </p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-1 px-6">
<!-- Business Name Field -->
<div class="py-3">
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Business Name</span>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800/50 h-14 px-4 text-base focus:outline-none transition-all placeholder:text-slate-400" placeholder="e.g. Martora Fresh Foods" required="" type="text"/>
</label>
</div>
<!-- Market Name Field -->
<div class="py-3">
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Market Name</span>
<select class="custom-select form-input w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800/50 h-14 px-4 text-base focus:outline-none transition-all">
<option disabled="" selected="" value="">Select Market (e.g. Ogbogonogo)</option>
<option value="ogbogonogo">Ogbogonogo Modern Market</option>
<option value="cable-point">Cable Point Market</option>
<option value="infant-jesus">Infant Jesus Market</option>
<option value="okra-market">Okra Market</option>
<option value="other">Other Location</option>
</select>
</label>
</div>
<!-- Shop Number Field -->
<div class="py-3">
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Stall / Shop Number</span>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800/50 h-14 px-4 text-base focus:outline-none transition-all placeholder:text-slate-400" placeholder="e.g. Shop B12, Block A" required="" type="text"/>
</label>
</div>
<!-- Phone Number Field -->
<div class="py-3">
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Phone Number</span>
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="text-slate-400 font-medium">+234</span>
</div>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800/50 h-14 pl-16 pr-4 text-base focus:outline-none transition-all placeholder:text-slate-400" placeholder="801 234 5678" required="" type="tel"/>
</div>
</label>
</div>
<!-- Pro Tip Card -->
<div class="mt-4 p-4 rounded-2xl bg-primary/10 border border-primary/20 flex gap-4 items-start">
<div class="bg-primary/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary text-xl">lightbulb</span>
</div>
<div>
<h4 class="text-sm font-bold text-primary mb-1">Pro Tip</h4>
<p class="text-sm text-slate-600 dark:text-slate-300 leading-snug">
                        Vendors with clear business names get <span class="font-bold text-primary">2x more orders</span>. Make it catchy!
                    </p>
</div>
</div>
</form>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark to-transparent">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-emerald-600 active:scale-[0.98] text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Continue</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<!-- iOS Home Indicator Spacing -->
<div class="h-4"></div>
</div>
</div>
</body></html>
