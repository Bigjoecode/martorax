<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rider In-Transit View - MartoraX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#04ae78",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f231d",
                        "slate-900": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Public Sans", sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white antialiased">
<!-- Main Container -->
<div class="relative flex flex-col h-screen w-full max-w-md mx-auto overflow-hidden bg-slate-900 shadow-2xl">
<!-- Header Overlay -->
<div class="absolute top-0 left-0 right-0 z-20 p-4">
<div class="flex items-center gap-3 bg-slate-900/80 backdrop-blur-md p-3 rounded-full border border-white/10 shadow-lg">
<button class="flex items-center justify-center size-10 rounded-full bg-white/10 text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-wider text-primary font-bold">En Route to Landmark</span>
<h2 class="text-white text-sm font-bold leading-tight truncate">Behind XYZ filling station</h2>
</div>
</div>
</div>
<!-- Map Section (Top 50%) -->
<div class="relative h-1/2 w-full overflow-hidden">
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Dark themed map with emerald route line showing delivery path" data-location="Asaba, Nigeria" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBfcIGkdu1DoOpOAiGgJbjunfhF8HJzzd89y75aEivOJPmNn0psfrGhgOoCis_8XV6UDZ-0MqvzJGm5Pe4PIaEt8ob20R0eKU6sqF2uxjbimfwu6nLMTpt9GU_-bGFLqIPlalGFxEzdg8iHLw92G2jJEhwJhAIsAB8Mn_LY__Dot4Z_sAT7lZPv-QIgdcvrLoCWTseyr39Or-Nkxp5Ll4Ds0UqVjTgFf729dqQUHOeGhCGM3tT2GS8y86LTpnF2xmKvhWL67aKkB4tX"); filter: brightness(0.7) contrast(1.2);'>
</div>
<!-- Mock Route Line Overlay (Visual Representation) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<svg class="w-full h-full opacity-80" viewbox="0 0 400 400">
<path d="M50,300 Q150,250 200,150 T350,50" fill="none" stroke="#04ae78" stroke-dasharray="1 12" stroke-linecap="round" stroke-width="6"></path>
<circle class="animate-pulse" cx="350" cy="50" fill="#04ae78" r="8"></circle>
<circle cx="50" cy="300" fill="white" r="10"></circle>
</svg>
</div>
</div>
<!-- Floating Action Buttons -->
<div class="absolute top-[48%] right-4 z-30 flex flex-col gap-3 -translate-y-1/2">
<button class="flex items-center justify-center size-14 rounded-full bg-primary text-white shadow-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl">call</span>
</button>
<button class="flex items-center justify-center size-14 rounded-full bg-slate-800 text-white shadow-xl active:scale-95 transition-transform border border-white/10">
<span class="material-symbols-outlined text-3xl">chat</span>
</button>
</div>
<!-- Information Hub (Bottom 50%) -->
<div class="relative flex-1 bg-background-dark rounded-t-xl z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] flex flex-col">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mt-3 mb-2"></div>
<div class="flex-1 overflow-y-auto px-6 pb-24">
<!-- Delivery Info Card -->
<div class="py-4 border-b border-white/5">
<div class="flex justify-between items-start mb-2">
<div>
<p class="text-white text-2xl font-bold leading-tight">Chidi K.</p>
<p class="text-primary text-sm font-medium">Customer</p>
</div>
<div class="bg-primary/20 px-4 py-2 rounded-xl text-right">
<p class="text-primary text-xl font-bold leading-none">8 mins</p>
<p class="text-primary/70 text-[10px] font-bold uppercase tracking-tighter">Remaining</p>
</div>
</div>
<div class="flex items-center gap-2 mt-4 text-white/80">
<span class="material-symbols-outlined text-primary">location_on</span>
<p class="text-base font-medium">Behind XYZ filling station, Asaba</p>
</div>
</div>
<!-- Action Panel: Report Delay -->
<div class="py-6">
<div class="flex flex-col gap-4 rounded-xl border border-white/10 bg-white/5 p-5">
<div class="flex items-center justify-between">
<div class="flex flex-col gap-1">
<p class="text-white text-base font-bold leading-tight">Report Delay</p>
<p class="text-white/50 text-xs font-normal leading-normal">Notify customer of Rain or Traffic</p>
</div>
<label class="relative flex h-[31px] w-[51px] cursor-pointer items-center rounded-full border-none bg-slate-700 p-0.5 has-[:checked]:justify-end has-[:checked]:bg-primary">
<div class="h-full w-[27px] rounded-full bg-white shadow-md"></div>
<input class="invisible absolute peer" type="checkbox"/>
</label>
</div>
<!-- Quick Report Tags -->
<div class="flex gap-2">
<button class="flex-1 py-2 px-3 rounded-lg border border-white/10 text-xs text-white/70 hover:bg-white/5 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-sm">rainy</span> Heavy Rain
                            </button>
<button class="flex-1 py-2 px-3 rounded-lg border border-white/10 text-xs text-white/70 hover:bg-white/5 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-sm">traffic</span> Jammed
                            </button>
</div>
</div>
</div>
<!-- Arrived Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                    I HAVE ARRIVED
                </button>
</div>
</div>
<!-- iOS Style Bottom Tab Bar -->
<div class="absolute bottom-0 left-0 right-0 h-20 bg-slate-900/90 backdrop-blur-xl border-t border-white/5 px-6 flex items-center justify-between z-40">
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-[10px] font-bold">Dashboard</span>
</div>
<div class="flex flex-col items-center gap-1 text-white/40">
<span class="material-symbols-outlined">payments</span>
<span class="text-[10px] font-medium">Earnings</span>
</div>
<div class="flex flex-col items-center gap-1 text-white/40">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-medium">History</span>
</div>
<div class="flex flex-col items-center gap-1 text-white/40">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</div>
</div>
</div>
</body></html>
