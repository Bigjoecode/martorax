<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MartoraX - Rate your Delivery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#059467",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f172a", // Slate 900 feel adjusted for theme
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .star-active { font-variation-settings: 'FILL' 1; color: #059467; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Rate your Delivery</h1>
<div class="size-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 overflow-y-auto custom-scrollbar pb-32">
<!-- Rider Profile Section -->
<section class="flex flex-col items-center py-8 px-6">
<div class="relative">
<div class="size-28 rounded-full border-4 border-primary/20 p-1">
<div class="w-full h-full rounded-full bg-cover bg-center" data-alt="Close up portrait of a friendly delivery rider" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDTlfJUwwmSrCFNoVk3HTCv-X9M9SCduqB19CexN3791KiuREIIWPSI8LXFyTuWw53P5YnyIH148YpLhA9hn0zUYPxqQ0gvuqRQjZnD_LZc5hiwpal-YbmXN-OBIYey-WvrMPK89pptHE3PmB76jcyHmwuLRMkMZvY_8Nmr1KYE29jXXzuCQYV5_Pqi1FiFsx4aoQhQ7vZACIEzJlnAXRgWEXZIdQEjgXHluQtwYg_XbzYnpRdfsn7Nrv8U4X0Ze3a4rmtRVnXgwQX-');">
</div>
</div>
<div class="absolute bottom-1 right-1 bg-primary text-white p-1 rounded-full flex items-center justify-center border-2 border-background-dark">
<span class="material-symbols-outlined text-sm">verified</span>
</div>
</div>
<div class="mt-4 text-center">
<h2 class="text-2xl font-extrabold text-slate-900 dark:text-white">Chidi K.</h2>
<div class="flex items-center justify-center gap-2 mt-1 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-lg">motorcycle</span>
<p class="text-sm font-medium">Yamaha MT-07 • Asaba Delivery</p>
</div>
</div>
</section>
<!-- Star Rating Section -->
<section class="px-6 pb-8 text-center">
<h4 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4">Tap to rate</h4>
<div class="flex justify-center gap-2">
<span class="material-symbols-outlined text-4xl star-active cursor-pointer">star</span>
<span class="material-symbols-outlined text-4xl star-active cursor-pointer">star</span>
<span class="material-symbols-outlined text-4xl star-active cursor-pointer">star</span>
<span class="material-symbols-outlined text-4xl star-active cursor-pointer">star</span>
<span class="material-symbols-outlined text-4xl text-slate-300 dark:text-slate-700 cursor-pointer">star</span>
</div>
</section>
<!-- Quick Compliments Checklist -->
<section class="px-6 py-6 border-t border-slate-200 dark:border-slate-800">
<h4 class="text-sm font-bold text-slate-500 dark:text-slate-400 mb-4 text-center">What went well?</h4>
<div class="grid grid-cols-1 gap-3">
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 cursor-pointer hover:border-primary/50 transition-all group">
<span class="text-base font-semibold group-hover:text-primary transition-colors">Fast Delivery</span>
<input checked="" class="h-6 w-6 rounded-full border-slate-300 dark:border-slate-700 text-primary focus:ring-primary focus:ring-offset-background-dark bg-transparent" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 cursor-pointer hover:border-primary/50 transition-all group">
<span class="text-base font-semibold group-hover:text-primary transition-colors">Safe Handling</span>
<input class="h-6 w-6 rounded-full border-slate-300 dark:border-slate-700 text-primary focus:ring-primary focus:ring-offset-background-dark bg-transparent" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 cursor-pointer hover:border-primary/50 transition-all group">
<span class="text-base font-semibold group-hover:text-primary transition-colors">Good Communication</span>
<input checked="" class="h-6 w-6 rounded-full border-slate-300 dark:border-slate-700 text-primary focus:ring-primary focus:ring-offset-background-dark bg-transparent" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 cursor-pointer hover:border-primary/50 transition-all group">
<span class="text-base font-semibold group-hover:text-primary transition-colors">Polite</span>
<input class="h-6 w-6 rounded-full border-slate-300 dark:border-slate-700 text-primary focus:ring-primary focus:ring-offset-background-dark bg-transparent" type="checkbox"/>
</label>
</div>
</section>
<!-- Additional Comments -->
<section class="px-6 py-4">
<h4 class="text-sm font-bold text-slate-500 dark:text-slate-400 mb-3">Additional comments</h4>
<textarea class="w-full h-32 p-4 rounded-xl bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent text-slate-900 dark:text-white placeholder-slate-500 resize-none transition-all" placeholder="Tell us more about the delivery..."></textarea>
</section>
</main>
<!-- Fixed Footer with Primary Button -->
<div class="fixed bottom-0 left-0 right-0 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 p-4 pb-8 space-y-4">
<button class="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-4 rounded-full shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
            Submit Review
        </button>
<!-- Bottom Tab Bar -->
<nav class="flex justify-around items-center pt-2">
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Search</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">confirmation_number</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Bookings</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Profile</span>
</a>
</nav>
</div>
</body></html>
