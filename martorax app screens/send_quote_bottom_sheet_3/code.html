<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#059467",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f172a",
                        "slate-card": "#1e293b",
                        "slate-input": "#334155",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .safe-area-top {
            padding-top: env(safe-area-inset-top);
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-900 font-display text-white min-h-screen flex flex-col overflow-hidden">
<header class="bg-slate-900/80 ios-blur sticky top-0 z-50 border-b border-slate-800 safe-area-top">
<div class="flex items-center justify-between px-4 h-16">
<button class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-white transition-colors rounded-full active:bg-slate-800">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-white text-lg font-bold">Create Quote</h1>
<div class="w-10"></div> 
</div>
</header>
<main class="flex-1 overflow-y-auto">
<div class="p-6 space-y-8 max-w-md mx-auto">
<div class="space-y-2">
<label class="block">
<span class="text-slate-400 text-xs font-bold uppercase tracking-widest ml-1">Service Description</span>
<textarea class="mt-2 block w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800 focus:border-primary min-h-[120px] placeholder:text-slate-600 p-4 text-base font-normal leading-relaxed resize-none transition-all" placeholder="E.g. Full apartment repaint with premium silk finish..."></textarea>
</label>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block">
<span class="text-slate-400 text-xs font-bold uppercase tracking-widest ml-1">Material (₦)</span>
<div class="relative mt-2">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">₦</span>
<input class="block w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800 focus:border-primary h-14 pl-10 pr-4 placeholder:text-slate-600 text-base font-medium transition-all" placeholder="0.00" type="number"/>
</div>
</label>
</div>
<div class="space-y-2">
<label class="block">
<span class="text-slate-400 text-xs font-bold uppercase tracking-widest ml-1">Labor (₦)</span>
<div class="relative mt-2">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">₦</span>
<input class="block w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-700 bg-slate-800 focus:border-primary h-14 pl-10 pr-4 placeholder:text-slate-600 text-base font-medium transition-all" placeholder="0.00" type="number"/>
</div>
</label>
</div>
</div>
<div class="bg-primary/10 border border-primary/30 rounded-2xl p-6 flex justify-between items-center">
<div>
<p class="text-primary text-xs font-extrabold uppercase tracking-widest">Total Quote Amount</p>
<p class="text-white text-3xl font-extrabold mt-1 tracking-tight">₦ 0.00</p>
</div>
<div class="bg-primary/20 w-14 h-14 flex items-center justify-center rounded-xl">
<span class="material-symbols-outlined text-primary text-3xl">payments</span>
</div>
</div>
<div class="flex items-center justify-between p-5 bg-slate-800 border border-slate-700 rounded-2xl">
<div class="flex flex-col gap-1 pr-4">
<div class="flex items-center gap-2">
<span class="text-white font-bold text-base">SafePay Escrow</span>
<span class="material-symbols-outlined text-slate-500 text-sm">info</span>
</div>
<p class="text-slate-400 text-xs leading-snug">Payment is held securely until the work is verified by the customer.</p>
</div>
<label class="relative inline-flex items-center cursor-pointer flex-shrink-0">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-14 h-7 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-[28px] rtl:peer-checked:after:-translate-x-[28px] peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<div class="h-24"></div> 
</div>
</main>
<footer class="bg-slate-900/95 ios-blur border-t border-slate-800 px-6 pt-4 pb-8 safe-area-bottom">
<div class="max-w-md mx-auto space-y-4">
<button class="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
<span>Send Quote to Customer</span>
<span class="material-symbols-outlined">send</span>
</button>
<p class="text-center text-slate-500 text-[11px] leading-relaxed">
                By sending, you agree to the platform's terms of service.<br/>
                The customer will be notified instantly to review this quote.
            </p>
</div>
</footer>

</body></html>
