<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#059467",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f172a", // Slate 900 for deeper contrast
                        "slate-card": "#1e293b", // Slate 800
                        "slate-input": "#334155", // Slate 700
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-900 font-display flex items-end justify-center min-h-screen overflow-hidden">
<!-- Bottom Sheet Backdrop -->
<div class="fixed inset-0 bg-black/60 z-0"></div>
<!-- Bottom Sheet Container -->
<div class="relative w-full max-w-md bg-slate-800 rounded-t-xl shadow-2xl z-10 flex flex-col max-h-[90vh]">
<!-- BottomSheetHandle -->
<div class="flex flex-col items-center pt-3 pb-2">
<div class="h-1.5 w-12 rounded-full bg-slate-600"></div>
</div>
<!-- SectionHeader -->
<div class="flex items-center justify-between px-6 py-4">
<h2 class="text-white text-xl font-bold leading-tight tracking-tight">Create Quote</h2>
<button class="text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 pb-8 space-y-6">
<!-- Service Description Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-slate-300 text-sm font-semibold uppercase tracking-wider pb-1">Service Description</p>
<textarea class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-600 bg-slate-700/50 focus:border-primary min-h-24 placeholder:text-slate-500 p-4 text-base font-normal leading-relaxed resize-none transition-all" placeholder="E.g. Full apartment repaint with premium silk finish..."></textarea>
</label>
</div>
<!-- Cost Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Material Cost -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-slate-300 text-sm font-semibold uppercase tracking-wider pb-1">Material (₦)</p>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">₦</span>
<input class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-600 bg-slate-700/50 focus:border-primary h-14 pl-10 pr-4 placeholder:text-slate-500 text-base font-medium transition-all" placeholder="0.00" type="number"/>
</div>
</label>
</div>
<!-- Labor Cost -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-slate-300 text-sm font-semibold uppercase tracking-wider pb-1">Labor (₦)</p>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">₦</span>
<input class="form-input flex w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-600 bg-slate-700/50 focus:border-primary h-14 pl-10 pr-4 placeholder:text-slate-500 text-base font-medium transition-all" placeholder="0.00" type="number"/>
</div>
</label>
</div>
</div>
<!-- Total Amount Card -->
<div class="bg-primary/10 border border-primary/20 rounded-xl p-4 flex justify-between items-center">
<div>
<p class="text-primary text-xs font-bold uppercase tracking-widest">Total Quote Amount</p>
<p class="text-white text-2xl font-extrabold mt-1">₦ 0.00</p>
</div>
<div class="bg-primary/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary text-3xl">payments</span>
</div>
</div>
<!-- SafePay Toggle -->
<div class="flex items-center justify-between p-4 bg-slate-700/30 border border-slate-600 rounded-xl">
<div class="flex flex-col gap-0.5">
<div class="flex items-center gap-2">
<span class="text-white font-bold text-base">SafePay Escrow</span>
<span class="material-symbols-outlined text-slate-400 text-sm cursor-help">info</span>
</div>
<p class="text-slate-400 text-[11px] leading-tight max-w-[200px]">Protect your payment until the work is verified by the customer.</p>
</div>
<!-- Custom iOS-style Switch -->
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-12 h-6 bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
<span>Send Quote to Customer</span>
<span class="material-symbols-outlined">send</span>
</button>
<p class="text-center text-slate-500 text-xs mt-4">
                    The customer will receive a notification to review and accept this quote.
                </p>
</div>
</div>
</div>
</body></html>
