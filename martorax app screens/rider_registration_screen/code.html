<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rider Registration - MartoraX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#059467", // Emerald 600 style
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f172a", // Slate 900 as requested
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Spline Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col text-slate-900 dark:text-white">
<!-- Top Navigation Bar -->
<header class="flex items-center p-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<div class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 cursor-pointer transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Join as a Rider</h2>
</header>
<main class="flex-1 flex flex-col px-6 pb-12 max-w-md mx-auto w-full">
<!-- Headline Section -->
<div class="pt-8 pb-6">
<h1 class="text-3xl font-bold leading-tight tracking-tight mb-3">Join as a Rider</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                Start earning today by delivering products across Asaba.
            </p>
</div>
<!-- Registration Form -->
<div class="space-y-5">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Full Name</label>
<input class="form-input flex w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 px-4 text-base transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Enter your full name" type="text"/>
</div>
<!-- Vehicle Type Selection -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Vehicle Type</label>
<div class="grid grid-cols-3 gap-2">
<button class="flex flex-col items-center justify-center p-3 rounded-lg border-2 border-primary bg-primary/10 text-primary transition-all">
<span class="material-symbols-outlined mb-1">moped</span>
<span class="text-xs font-bold">Bike</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 hover:border-primary transition-all">
<span class="material-symbols-outlined mb-1">electric_rickshaw</span>
<span class="text-xs font-medium">Keke</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 hover:border-primary transition-all">
<span class="material-symbols-outlined mb-1">directions_car</span>
<span class="text-xs font-medium">Car/Van</span>
</button>
</div>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Phone Number</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-slate-500 font-medium">+234</span>
<input class="form-input flex w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 pl-16 pr-4 text-base transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="803 000 0000" type="tel"/>
</div>
</div>
<!-- Referral Code -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Referral Code <span class="text-xs normal-case opacity-60">(Optional)</span></label>
<input class="form-input flex w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 px-4 text-base transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Enter code" type="text"/>
</div>
</div>
<!-- Action Button & Footer -->
<div class="mt-10 flex flex-col gap-6 ios-safe-bottom">
<button class="w-full bg-primary hover:bg-emerald-700 text-white font-bold h-14 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Continue
            </button>
<div class="text-center space-y-4">
<p class="text-sm text-slate-500 dark:text-slate-500">
                    Already a rider? 
                    <a class="text-primary font-bold hover:underline" href="#">Login</a>
</p>
<p class="text-[11px] text-slate-500/60 leading-tight px-4">
                    By continuing, you agree to the MartoraX Terms of Service and Privacy Policy.
                </p>
</div>
</div>
</main>
<!-- Map Decoration (Abstract) -->
<div class="fixed bottom-0 right-0 -z-10 opacity-10 pointer-events-none">
<img class="w-64 h-64 object-cover mask-gradient" data-alt="Abstract dark city map illustration" data-location="Asaba" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWk-TKp6PzQLQJRG3fXvOLAZLeIkhmtAAzQBywEaTO6XFxvLd0HzX-qRYZad_FdwbXnnQaBEzqnUfOr89SjFQMBP2-doc5P5kkcC2BgU8CvhMp_nR9B1xuCZBoE9035y8KI-xv0Ke3TpDdCqEtKd5eF2dMH-okMzA6p_JE865-HDcynuBTjF2BcyY71JH70TkLxYP5vcsImRoKrvBEPtehmizSx3CNaVEEZ4zfcnSsK7hCbjnie0Mr73dreranFuoCtb7iXwpemseR"/>
</div>
<style>
        .mask-gradient {
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
        }
    </style>
</body></html>
