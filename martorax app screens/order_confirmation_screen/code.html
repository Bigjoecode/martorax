<title>Order Confirmation - MartoraX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#09f6ab",
                        "background-light": "#f5f8f7",
                        "background-dark": "#10221c",
                        "slate-custom": "#0f172a"
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },

<style>
        body {
            font-family: 'Spline Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .success-checkmark-glow {
            box-shadow: 0 0 40px rgba(9, 246, 171, 0.15);

<body class="bg-slate-custom text-white min-h-screen flex flex-col">
<!-- Top Navigation -->
<div class="flex items-center p-4 justify-between sticky top-0 bg-slate-custom/80 backdrop-blur-md z-10">
<div class="text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer hover:bg-white/10 p-2 rounded-full transition-colors">close</span>
</div>

</div>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col items-center px-6 pb-12">

<div class="mt-8 mb-6 flex items-center justify-center">
<div class="w-24 h-24 bg-primary/20 rounded-full flex items-center justify-center success-checkmark-glow border border-primary/30">
<span class="material-symbols-outlined text-primary text-6xl font-bold">check</span>
</div>
</div>
<!-- Headline & Subtext -->
<div class="text-center space-y-3 mb-10">
<h1 class="text-white tracking-tight text-[32px] font-bold leading-tight">Order Placed Successfully!</h1>
<div class="flex flex-col items-center gap-2">
<p class="text-slate-300 text-base font-normal leading-relaxed max-w-xs mx-auto">
                    Your payment is held securely in <span class="text-primary font-medium">SafePay</span>. 
                    Stall 42 is now preparing your items.
                </p>
<div class="flex items-center gap-1 text-primary/80 bg-primary/5 px-3 py-1 rounded-full border border-primary/10">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-xs font-semibold uppercase tracking-wider">SafePay Protected</span>
</div>
</div>
</div>
<!-- Order Summary Card -->
<div class="w-full bg-slate-800/40 border border-slate-700/50 rounded-2xl p-5 space-y-4 mb-10">
<div class="flex justify-between items-center border-b border-slate-700/50 pb-3">
<h3 class="text-slate-400 text-sm font-medium uppercase tracking-wider">Order Details</h3>
<span class="text-primary text-sm font-bold">#MX-88219</span>
</div>
<div class="grid grid-cols-2 gap-4 pt-1">
<div class="space-y-1">
<p class="text-slate-400 text-xs uppercase">Items</p>
<p class="text-white text-base font-medium">3 Fresh Items</p>
</div>
<div class="space-y-1 text-right">
<p class="text-slate-400 text-xs uppercase">Total Paid</p>
<p class="text-white text-base font-medium">$42.50</p>
</div>
<div class="space-y-1">
<p class="text-slate-400 text-xs uppercase">Est. Delivery</p>
<p class="text-white text-base font-medium">20-30 mins</p>
</div>
<div class="space-y-1 text-right">
<p class="text-slate-400 text-xs uppercase">Status</p>
<p class="text-primary text-base font-medium">Confirmed</p>
</div>
</div>
</div>
<!-- Visual Context (Small Grid) -->
<div class="w-full mb-10">
<div class="grid grid-cols-3 gap-3">
<div class="aspect-square bg-slate-800 rounded-xl bg-center bg-cover border border-slate-700/50" data-alt="close up shot of gourmet fresh food" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBqNCrTpWrcXSpxhJodHG893Mto94ktewSaCBN4ys85vrRY-yu86uOGu7EO1GgovvnpaymPVM16-1mh-RMNs9fryog4cu2FonMOybJSOIKQXUBgNsCZ12mkH3pno5dUbVxRA-UN99yYxCYfVd_rXCF3YzUHbWG2ibh8Je4n6WmX0K5OQqJHFjL8sOdAn2YB3aby1aUYDpzcC_tbrH7OI9NNUjDhD-MnWcqcVJhIquz3memMOyFOh-x7gCz06UDotTIh29ho1RbWwZa1");'></div>

<div class="aspect-square bg-slate-800 rounded-xl bg-center bg-cover border border-slate-700/50" data-alt="fresh ingredients and vegetables in a market" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD8HwmP4l_UMvpg0L9Zs-oBAeAAvKoBsKKCZ8gPvYaCHyR7vr1rLZLqvOFCcybkA6FftfcVAcjnk0ucK-QQE8F3heWncIaufCHjKuFlmvYALLlPfpm_aHA6c3EtTfK174-OYYnplOzeF7fAlR3Q2ZydcdAXOaWxSljudxCthtqfD-uvBv3usQWdIXFqiGsW9F-0eo1tJ0M8l9W0ighISJBbbctYuYUx0W1KiX2dhvbEEYOGjSO9urF9C620sSg6kMq1ZR1B2z0esHXr");'></div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full mt-auto space-y-3">
<button class="w-full py-4 bg-primary text-slate-900 font-bold rounded-xl text-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">local_shipping</span>
                Track Order
            </button>
<button class="w-full py-4 border border-slate-700 text-white font-semibold rounded-xl text-lg hover:bg-white/5 active:scale-[0.98] transition-all">
                Back to Home
            </button>
</div>
</main>
<!-- Visual Divider Footer -->
<div class="h-8 bg-transparent"></div>
