<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rider Delay Reporting - MartoraX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#089166",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f172a", // Using Slate 900 as requested
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased">
<div class="flex flex-col min-h-screen max-w-md mx-auto relative">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">Report Delay</h2>
<div class="size-12"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 overflow-y-auto">
<!-- ActionPanel / Notification Banner -->
<div class="p-4 @container">
<div class="flex flex-1 flex-col items-start justify-between gap-4 rounded-xl border border-primary/30 bg-primary/10 p-5 @[480px]:flex-row @[480px]:items-center">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">notifications_active</span>
<p class="text-primary text-base font-bold leading-tight">Instant Notification</p>
</div>
<p class="text-slate-600 dark:text-slate-400 text-sm font-normal leading-normal">Shopper and Vendor will be notified immediately of your situation in Asaba.</p>
</div>
</div>
</div>
<!-- HeadlineText -->
<div class="px-4 pt-4">
<h3 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight text-left">What's the issue?</h3>
<p class="text-slate-500 text-sm mt-1">Select the reason for your delay</p>
</div>
<!-- RadioList -->
<div class="flex flex-col gap-3 p-4">
<label class="flex items-center gap-4 rounded-xl border border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800/50 p-4 flex-row-reverse cursor-pointer transition-colors hover:border-primary/50 group">
<input checked="" class="h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary checked:bg-primary focus:ring-0 focus:ring-offset-0 checked:border-primary rounded-full" name="delay_reason" type="radio"/>
<div class="flex grow items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">rainy</span>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-white text-base font-semibold">Heavy Rain</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">Impacts delivery speed</p>
</div>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800/50 p-4 flex-row-reverse cursor-pointer transition-colors hover:border-primary/50 group">
<input class="h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary checked:bg-primary focus:ring-0 focus:ring-offset-0 checked:border-primary rounded-full" name="delay_reason" type="radio"/>
<div class="flex grow items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">car_repair</span>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-white text-base font-semibold">Vehicle Breakdown</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">Need assistance or new vehicle</p>
</div>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800/50 p-4 flex-row-reverse cursor-pointer transition-colors hover:border-primary/50 group">
<input class="h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary checked:bg-primary focus:ring-0 focus:ring-offset-0 checked:border-primary rounded-full" name="delay_reason" type="radio"/>
<div class="flex grow items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">traffic</span>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-white text-base font-semibold">Heavy Traffic</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">Unavoidable road congestion</p>
</div>
</div>
</label>
<label class="flex items-center gap-4 rounded-xl border border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800/50 p-4 flex-row-reverse cursor-pointer transition-colors hover:border-primary/50 group">
<input class="h-6 w-6 border-2 border-slate-300 dark:border-slate-600 bg-transparent text-primary checked:bg-primary focus:ring-0 focus:ring-offset-0 checked:border-primary rounded-full" name="delay_reason" type="radio"/>
<div class="flex grow items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">wrong_location</span>
</div>
<div class="flex flex-col">
<p class="text-slate-900 dark:text-white text-base font-semibold">Incorrect Address</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">Cannot find the customer location</p>
</div>
</div>
</label>
</div>
<!-- TextField -->
<div class="flex flex-col gap-4 px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal pb-2">Comment</p>
<textarea class="form-input flex w-full resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-800 focus:border-primary min-h-32 placeholder:text-slate-500 p-4 text-base font-normal leading-normal shadow-sm" placeholder="Add more details about the situation..."></textarea>
</label>
</div>
<div class="h-24"></div> <!-- Extra scroll space for the bottom button -->
</main>
<!-- Fixed Footer Action Button -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/95 dark:via-background-dark/95 to-transparent">
<button class="w-full h-14 bg-primary hover:bg-emerald-600 text-white font-bold text-lg rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">send</span>
                Submit Report
            </button>
<div class="h-2"></div> <!-- iOS Home Indicator space -->
</div>
</div>
</body></html>
