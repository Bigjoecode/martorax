<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#05ad78",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f231d",
                        "slate-900": "#020617",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<div class="relative flex h-screen w-full flex-col bg-slate-900 group/design-root overflow-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between z-10">
<div class="text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Success</h2>
</div>
<!-- Success Visual Area -->
<div class="flex-1 flex flex-col items-center justify-center px-6 relative">
<!-- Decorative Glow Background -->
<div class="absolute w-[300px] h-[300px] bg-primary/20 rounded-full blur-[80px] -z-0"></div>
<!-- Emerald Checkmark Icon -->
<div class="relative z-10 flex items-center justify-center w-32 h-32 bg-primary/10 rounded-full mb-8 border border-primary/30">
<div class="flex items-center justify-center w-24 h-24 bg-primary rounded-full shadow-[0_0_40px_rgba(5,173,120,0.4)]">
<span class="material-symbols-outlined text-white text-[64px]">check</span>
</div>
</div>
<!-- Content -->
<div class="z-10 text-center space-y-4">
<h1 class="text-white tracking-tight text-[32px] font-extrabold leading-tight px-4 text-center">
                    You're Live, Alex!
                </h1>
<p class="text-slate-400 text-lg font-medium leading-relaxed pb-3 pt-1 px-4 text-center max-w-[340px] mx-auto">
                    Your profile is now visible to customers across Asaba. Start receiving bookings and growing your business.
                </p>
</div>
</div>
<!-- Action Buttons Footer -->
<div class="p-6 pb-12 z-10">
<div class="flex justify-center">
<div class="flex flex-1 gap-4 max-w-[480px] flex-col items-stretch">
<!-- Primary Button -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] w-full shadow-lg shadow-primary/20">
<span class="truncate">Go to Dashboard</span>
</button>
<!-- Secondary Outline Button -->
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-transparent border-2 border-slate-700 text-white text-base font-bold leading-normal tracking-[0.015em] w-full">
<span class="truncate">Preview My Profile</span>
</button>
</div>
</div>
</div>
<!-- iOS Home Indicator Spacing -->
<div class="h-5 bg-transparent"></div>
<!-- Image Component (Invisible/Metadata) -->
<div class="hidden">
<div data-alt="Abstract green glowing aura with dark background"></div>
</div>
</div>
</body></html>
