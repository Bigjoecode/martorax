<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vendor Landmark Pinning - MartoraX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#059467",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f231d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white font-display">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-[480px] mx-auto bg-background-light dark:bg-background-dark">
<!-- TopAppBar Component -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between shrink-0">
<div class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Store Location</h2>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto pb-32">
<!-- HeadlineText Component -->
<h3 class="text-slate-900 dark:text-white tracking-light text-2xl font-bold leading-tight px-4 text-left pb-2 pt-5">Pin Your Location</h3>
<!-- BodyText Component -->
<p class="text-slate-600 dark:text-slate-300 text-base font-normal leading-normal pb-3 pt-1 px-4">
                Drag the map to place the pin exactly on your shop. Then, provide a well-known landmark nearby to help customers find you easily.
            </p>
<!-- Map Component with Pin Overlay -->
<div class="relative px-4 py-3">
<div class="relative w-full aspect-[4/5] bg-slate-200 dark:bg-slate-800 rounded-xl overflow-hidden shadow-inner">
<!-- Map Image -->
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Map of Asaba Nigeria showing streets and buildings" data-location="Asaba, Nigeria" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDfZCt8S_MiNGSOX8XS_IOVNOz0iDjUI3drPeKtB9fWcrZHzkLhvPeA_RMNFe43M6nBMNB0Iwcl9aaRBZ4hQe5YpOoy8fIbh_nzw29PUr2ZHj-Tsw6zWdyBHShntSZui_LoAYZCoCXqy5PNmDi4u0XiDWgBBv5Lenu4UKvxjQ8bazwyxTrIM4HaDrPgiJa8hPaYefebznYPRRkN_sw0r-m29RkxM_B56GPhW_ZZsB4-RWbtxPWVLfRRanfwj9ev2YBWtv41G5HIpHL3");'>
</div>
<!-- Static Pin in center (simulating draggable center) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="flex flex-col items-center -mt-8">
<div class="bg-primary text-white p-2 rounded-full shadow-lg border-2 border-white">
<span class="material-symbols-outlined text-3xl">location_on</span>
</div>
<div class="w-1 h-4 bg-primary"></div>
</div>
</div>
<!-- Floating Recenter Button -->
<div class="absolute bottom-4 right-4">
<button class="bg-white dark:bg-slate-700 p-3 rounded-full shadow-lg flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</div>
</div>
<!-- TextField Component -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3 mt-2">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal pb-2">Nearby Landmark</p>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-[#306957] bg-white dark:bg-[#18342b] focus:border-primary min-h-[120px] placeholder:text-slate-400 dark:placeholder:text-[#8fccb8] p-[15px] text-base font-normal leading-normal" placeholder="e.g., Opp. Nnebisi Junction, behind XYZ filling station"></textarea>
</label>
</div>
</div>
<!-- Sticky Bottom Action Button -->
<div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark to-transparent pt-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-colors active:scale-[0.98]">
                Confirm Location
            </button>
<!-- Safe Area Spacer for iOS -->
<div class="h-4"></div>
</div>
</div>
</body></html>
