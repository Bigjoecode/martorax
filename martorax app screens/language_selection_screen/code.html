<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Language Selection - MartoraX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#09f6ab",
                        "background-light": "#f5f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .radio-selected {
            border-color: #09f6ab;
            background-color: rgba(9, 246, 171, 0.05);
        }
        /* Custom radio styling based on the provided RadioList example */
        .custom-radio {
            --radio-dot-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(9,246,171)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3ccircle cx=%278%27 cy=%278%27 r=%273%27/%3e%3c/svg%3e');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-10 bg-background-light dark:bg-background-dark/95 backdrop-blur-md px-4 pt-4 pb-2">
<div class="flex items-center justify-between h-12">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Select Language</h2>
</div>
</header>
<main class="flex-1 flex flex-col px-4 max-w-lg mx-auto w-full">
<!-- Headline and Body Text -->
<div class="pt-6 pb-8">
<h1 class="text-[32px] font-bold leading-tight text-center mb-3">Choose your language</h1>
<p class="text-base font-normal leading-normal text-slate-500 dark:text-[#8fccb8] text-center px-6">
                Experience MartoraX in the language you're most comfortable with.
            </p>
</div>
<!-- Language Radio List -->
<div class="flex flex-col gap-4 mb-10 custom-radio">
<!-- English -->
<label class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-[#306957] p-4 flex-row-reverse cursor-pointer transition-all active:scale-[0.98] has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input checked="" class="h-6 w-6 border-2 border-slate-300 dark:border-[#306957] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary" name="language" type="radio"/>
<div class="flex grow items-center gap-4">
<div class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-[#1a352d] text-primary">
<span class="material-symbols-outlined text-[20px]">language</span>
</div>
<div class="flex flex-col">
<p class="font-bold text-base">English</p>
<p class="text-sm font-normal text-slate-500 dark:text-[#8fccb8]">Standard English</p>
</div>
</div>
</label>
<!-- Pidgin -->
<label class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-[#306957] p-4 flex-row-reverse cursor-pointer transition-all active:scale-[0.98] has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="h-6 w-6 border-2 border-slate-300 dark:border-[#306957] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary" name="language" type="radio"/>
<div class="flex grow items-center gap-4">
<div class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-[#1a352d] text-primary">
<span class="material-symbols-outlined text-[20px]">forum</span>
</div>
<div class="flex flex-col">
<p class="font-bold text-base">Pidgin</p>
<p class="text-sm font-normal text-slate-500 dark:text-[#8fccb8]">Naija Pidgin</p>
</div>
</div>
</label>
<!-- Igbo -->
<label class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-[#306957] p-4 flex-row-reverse cursor-pointer transition-all active:scale-[0.98] has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="h-6 w-6 border-2 border-slate-300 dark:border-[#306957] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary" name="language" type="radio"/>
<div class="flex grow items-center gap-4">
<div class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-[#1a352d] text-primary">
<span class="material-symbols-outlined text-[20px]">public</span>
</div>
<div class="flex flex-col">
<p class="font-bold text-base">Igbo</p>
<p class="text-sm font-normal text-slate-500 dark:text-[#8fccb8]">Ásụ̀sụ́ Ìgbò</p>
</div>
</div>
</label>
<!-- Yoruba -->
<label class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-[#306957] p-4 flex-row-reverse cursor-pointer transition-all active:scale-[0.98] has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="h-6 w-6 border-2 border-slate-300 dark:border-[#306957] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary" name="language" type="radio"/>
<div class="flex grow items-center gap-4">
<div class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-[#1a352d] text-primary">
<span class="material-symbols-outlined text-[20px]">translate</span>
</div>
<div class="flex flex-col">
<p class="font-bold text-base">Yoruba</p>
<p class="text-sm font-normal text-slate-500 dark:text-[#8fccb8]">Èdè Yorùbá</p>
</div>
</div>
</label>
<!-- Hausa -->
<label class="flex items-center gap-4 rounded-xl border-2 border-slate-200 dark:border-[#306957] p-4 flex-row-reverse cursor-pointer transition-all active:scale-[0.98] has-[:checked]:border-primary has-[:checked]:bg-primary/5">
<input class="h-6 w-6 border-2 border-slate-300 dark:border-[#306957] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary" name="language" type="radio"/>
<div class="flex grow items-center gap-4">
<div class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-[#1a352d] text-primary">
<span class="material-symbols-outlined text-[20px]">speech_to_text</span>
</div>
<div class="flex flex-col">
<p class="font-bold text-base">Hausa</p>
<p class="text-sm font-normal text-slate-500 dark:text-[#8fccb8]">Harshen Hausa</p>
</div>
</div>
</label>
</div>
</main>
<!-- Footer Action -->
<footer class="sticky bottom-0 bg-background-light dark:bg-background-dark/95 backdrop-blur-md px-4 py-6">
<div class="max-w-lg mx-auto w-full">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-background-dark text-lg font-bold leading-normal tracking-wide shadow-lg shadow-primary/10 transition-transform active:scale-[0.97]">
<span class="truncate">Continue</span>
</button>
<!-- iOS Home Indicator Spacing -->
<div class="h-4"></div>
</div>
</footer>
</body></html>
